[ai_keys]
## Default Vanna functionality ##
# vanna_api = ""
# vanna_model = ""
## Open Router Values for Anthropic ##
# anthropic_api = ""
# anthropic_model = "claude-3-5-sonnet-latest"
## Local ollama install required ##
# ollama_model = "llama3.2"
# ollama_embed_model = "nomic-embed-text"
## Google Gemini Configuration ##
# gemini_api = ""
# gemini_model = "gemini-2.0-flash-exp"
# ollama_temperature = 0.5

[rag_model]
### OPTIONAL ###
## ChromaDB Configuration for local RAG storage##
# chroma_path = "./chromadb"
## Milvus Lite (file-backed) Configuration ##
# [rag_model.milvus]
# uri = "./milvus_demo.db"  # or persist_path = "./milvus_demo.db"
# text_dim = 768
# collection_prefix = "thrive"

[security]
allow_llm_to_see_data = true
restrict_rag_by_role = false

[cookie]
password = ""

[postgres]
host = "localhost"
port = 5469
database = "postgres"
user = "postgres"
password = "postgres"
## Database object type for training: "tables" or "views"
object_type = "tables"
## Database schema to query: default is "public"
schema_name = "public"
dialect = "redshift"

[analytics_db]
## Read-only warehouse the agent's clinical-data tools query against.
## Required when agentic mode is enabled.
## url accepts any SQLAlchemy URL. For Redshift use redshift+psycopg2://
## (provided by the sqlalchemy-redshift package, already in deps) — the
## plain postgresql+psycopg2:// dialect runs `SHOW standard_conforming_strings`
## on connect, which Redshift rejects.
# url = "redshift+psycopg2://user:pass@host:5439/db"
## dialect is the adapter's own taxonomy (independent of the URL prefix).
## Set "redshift" for Redshift connections — controls which read-only
## guard is installed. Defaults to "postgres".
# dialect = "redshift"
## schema is prepended to every unqualified view reference in the agent's
## SQL templates (e.g. "dw" → "dw.federated_results_v"). Required when
## the warehouse stores the views in a schema not on the connection's
## search_path. Leave blank/omit for SQLite or when search_path already
## resolves the views.
# schema = "dw"

[agent]
## Hard caps on agent runs (per spec §12.4).
## max_tool_calls — abort the run after this many tool invocations
## (default 7). Excludes the synthetic final_result output tool.
# max_tool_calls = 7
## max_wall_clock_s — abort the run after this many seconds of wall
## time (default 120.0). Raise for slower local Ollama models.
# max_wall_clock_s = 120.0
## Roles allowed to see the executed SQL and raw row data behind the
## tool-call card's expanders. Add "doctor" once the UX is reviewed.
## Names are case-insensitive: admin | doctor | nurse | patient.
# expose_query_details_to = ["admin"]
## Ollama thinking toggle. When True, the request body carries
## `think: true` so reasoning models surface ThinkingPart deltas in the
## chat UI. Non-thinking models ignore the field. Global default.
# ollama_think = true
## Per-model override: a model name present here wins over `ollama_think`.
## Useful when rotating models with different thinking semantics — e.g.
## qwen3.6 tends to do better tool-calling with thinking off, while
## gpt-oss benefits from chain-of-thought left on.
# [agent.ollama_think_per_model]
# "qwen3.6:27b" = false
# "gpt-oss:20b" = true

[sqlite]
database = "./pgDatabase/db.sqlite3"

[discord]
## Discord webhook URL for logging notifications (optional)
webhook_url = ""

[display]
## Maximum number of rows to display and store in DataFrames (default: 1000)
max_display_rows = 1000

[session]
## Maximum number of messages to keep in session state for performance (default: 20)
## Older messages are removed from session state but remain in the database
max_session_messages = 20

[retry]
## Maximum number of automatic SQL retries on execution failure (default: 2)
## Set to 0 to disable automatic retries (manual retry button will still appear)
## Each retry includes progressive guidance to help the LLM correct mistakes
max_sql_retries = 2

[features]
## Enable semantic recognition for magic commands (default: true)
## When enabled, natural language queries like "show distribution of age" will be
## recognized and mapped to magic commands (e.g., /distribution) with user confirmation
semantic_magic_enabled = true

# [auth]
## Authentication mode: "oidc" enables Okta SSO; absent or any other value uses local password auth.
# mode = "oidc"
## OIDC redirect URI registered with the Okta application.
# redirect_uri = "http://localhost:8501/oauth2callback"
## Streamlit cookie signing secret for the OIDC session (random, ≥ 32 bytes recommended).
# cookie_secret = ""
## Where to send the user after Okta logout (must be in Okta sign-out redirect URIs).
# post_logout_redirect_url = "http://localhost:8501/"
## Okta application credentials.
# client_id = ""
# client_secret = ""
## OIDC discovery document URL for the Okta authorization server.
# server_metadata_url = "https://<your-okta-domain>/oauth2/default/.well-known/openid-configuration"
## Scopes requested at login. "groups" is required for role mapping via Okta groups.
# client_kwargs = { scope = "openid email profile groups" }
