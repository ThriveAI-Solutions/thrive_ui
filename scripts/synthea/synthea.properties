# Synthea generator configuration for ThriveAI sample database.
# Targets the §7.12 V1 view whitelist. Western New York demographics.

# Output format — CSV only.
exporter.csv.export = true
exporter.fhir.export = false
exporter.ccda.export = false
exporter.cpcda.export = false
exporter.hospital.fhir.export = false
exporter.practitioner.fhir.export = false
exporter.text.export = false

# Generate claims data (drives federated_claims_*_v).
exporter.csv.included_files =
exporter.cost_access_outcomes_report = false

# Geographic targeting — Western New York.
generate.geography.country_code = US
generate.demographics.default_file = geography/demographics.csv

# Reference time pinned for determinism. Updated when regenerating.
# Override at command line: --referenceTime=<unix-ms>
generate.reference_time = 1747443600000

# Append-only output dir.
exporter.baseDirectory = ./data/sample/synthea/

# Disable per-encounter file output (we want consolidated CSVs only).
exporter.years_of_history = 10
